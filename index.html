<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="OnPoint — La tua To-Do e Will-Do List personale.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OnPoint</title>

  <!-- PWA Manifest & App Icon -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="amoled">

  <div id="app">

    <!-- ── Top Bar ── -->
    <div class="top-bar">
      <div id="top-bar-title" class="top-bar-title">Tasks</div>
      <div class="top-bar-actions">
        <button id="search-toggle" class="top-bar-icon" aria-label="Cerca">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <button id="history-toggle" class="top-bar-icon" aria-label="Cronologia">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
        </button>
        <button id="settings-toggle" class="top-bar-icon" aria-label="Impostazioni">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>

    <!-- ── Content Area ── -->
    <div id="content-area" class="content-area">

      <!-- Add Buttons -->
      <div class="add-buttons">
        <button id="add-todo-btn" class="add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          To Do
        </button>
        <button id="add-willdo-btn" class="add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Will Do
        </button>
      </div>

      <!-- To Do Section -->
      <div class="section-header">
        <span class="section-title">To Do</span>
        <span id="todo-counter" class="task-counter">0</span>
      </div>
      <div id="todo-list" class="task-list"></div>

      <div class="separator-wrapper"><hr class="separator"></div>

      <!-- Will Do Section -->
      <div class="section-header">
        <span class="section-title">Will Do</span>
        <span id="willdo-counter" class="task-counter">0</span>
      </div>
      <div id="willdo-list" class="task-list"></div>

    </div>

  </div>





  <!-- ── Search Bar ── -->
  <div id="search-bar" class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search-input" placeholder="Cerca tra le tasks..." autocomplete="off">
    <div class="search-close" id="search-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
  </div>

  <!-- ── Task Input Modal ── -->
  <div id="task-modal" class="modal-overlay">
    <div class="modal-box">
      <div id="modal-title" class="modal-title">Nuova Task</div>
      <input type="text" id="task-input" class="modal-input" placeholder="Cosa devi fare?" autocomplete="off">
      <div class="modal-actions">
        <button id="cancel-btn" class="modal-btn modal-btn-cancel">Annulla</button>
        <button id="save-btn" class="modal-btn modal-btn-confirm">Salva</button>
      </div>
    </div>
  </div>

  <!-- ── History Modal ── -->
  <div id="history-modal" class="history-overlay">
    <div class="history-menu">
      <div class="history-header">
        <div class="history-title">Recenti Eliminati</div>
        <button class="history-close" id="close-history-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- ── Settings Modal ── -->
  <div id="settings-modal" class="settings-overlay">
    <div class="settings-menu">
      <div class="settings-header">
        <h2 class="settings-title">Impostazioni</h2>
        <button class="settings-close" id="close-settings-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <!-- Cloud Sync -->
      <div class="settings-card" id="profile-card">
        <div class="settings-card-title">Cloud Sync</div>
        <!-- Signed out state -->
        <div id="google-signed-out">
          <button id="google-signin-btn" class="google-btn-minimal">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span>Connetti account Google</span>
          </button>
        </div>
        <!-- Signed in state -->
        <div id="google-signed-in" style="display:none;">
          <div class="google-profile-compact">
            <img id="profile-avatar" class="profile-avatar-compact" src="" alt="">
            <div class="profile-text-compact">
              <div id="profile-name" class="profile-name-compact"></div>
              <div id="sync-status" class="sync-status-compact">Non sincronizzato</div>
            </div>
            <div class="google-actions-compact">
              <button id="sync-now-btn" class="action-icon-btn" title="Sincronizza ora">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              </button>
              <button id="google-signout-btn" class="action-icon-btn danger" title="Disconnetti">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">Aspetto</div>
        <div class="settings-row">
          <span>Tema Colore</span>
          <div class="theme-selector" id="theme-picker">
            <div class="theme-dot" data-theme="cyan" style="background:#38bdf8"></div>
            <div class="theme-dot" data-theme="emerald" style="background:#34d399"></div>
            <div class="theme-dot" data-theme="violet" style="background:#a78bfa"></div>
            <div class="theme-dot" data-theme="coral" style="background:#fb7185"></div>
            <div class="theme-dot" data-theme="gold" style="background:#fbbf24"></div>
            <div class="theme-dot active" data-theme="white" style="background:#ffffff"></div>
          </div>
        </div>
        <div class="settings-row">
          <span>AMOLED True Black</span>
          <label class="toggle-switch">
            <input type="checkbox" id="amoled-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">Dati</div>
        <button id="settings-export" class="settings-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Esporta</button>
        <label for="import-file-input" class="settings-btn" style="cursor:pointer;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>Importa</label>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
        <button id="settings-clear" class="settings-btn danger">Cancella tutti i dati</button>
      </div>
    </div>
  </div>

  <!-- ── Sync Conflict Dialog ── -->
  <div id="sync-conflict-overlay" class="modal-overlay">
    <div class="modal-box sync-conflict-box">
      <div class="modal-title">Dati trovati sul cloud</div>
      <p class="sync-conflict-text">Sul tuo Google Drive sono già presenti dei dati salvati. Come vuoi procedere?</p>
      <div class="sync-conflict-info">
        <div class="sync-info-row">
          <span class="sync-info-label">📱 Dati locali</span>
          <span id="sync-local-count" class="sync-info-value">0 elementi</span>
        </div>
        <div class="sync-info-row">
          <span class="sync-info-label">☁️ Dati cloud</span>
          <span id="sync-cloud-count" class="sync-info-value">0 elementi</span>
        </div>
      </div>
      <button id="sync-use-cloud" class="settings-btn sync-choice-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M20 21H4"/></svg>
        Sovrascrivi dati locali
      </button>
      <button id="sync-use-local" class="settings-btn sync-choice-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 14 12 9 7 14"/><line x1="12" y1="9" x2="12" y2="21"/><path d="M20 3H4"/></svg>
        Sovrascrivi i dati online
      </button>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="Sortable.min.js" charset="utf-8"></script>
  <script src="app.js" charset="utf-8"></script>
  <script src="google-sync.js" charset="utf-8"></script>

</body>
</html>
