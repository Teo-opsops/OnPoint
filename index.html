<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="OnPoint — La tua To-Do e Will-Do List personale.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OnPoint</title>

  <!-- PWA Manifest & App Icon -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- ── Top Bar ── -->
    <div class="top-bar">
      <div id="top-bar-title" class="top-bar-title">Tasks</div>
      <div class="top-bar-actions">
        <button id="search-toggle" class="top-bar-icon" aria-label="Cerca">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <button id="history-toggle" class="top-bar-icon" aria-label="Cronologia">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
        </button>
        <button id="settings-toggle" class="top-bar-icon" aria-label="Impostazioni">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>

    <!-- ── Content Area ── -->
    <div id="content-area" class="content-area">

      <!-- Add Buttons -->
      <div class="add-buttons">
        <button id="add-todo-btn" class="add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          To Do
        </button>
        <button id="add-willdo-btn" class="add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Will Do
        </button>
      </div>

      <!-- To Do Section -->
      <div class="section-header">
        <span class="section-title">To Do</span>
        <span id="todo-counter" class="task-counter">0</span>
      </div>
      <div id="todo-list" class="task-list"></div>

      <div class="separator-wrapper"><hr class="separator"></div>

      <!-- Will Do Section -->
      <div class="section-header">
        <span class="section-title">Will Do</span>
        <span id="willdo-counter" class="task-counter">0</span>
      </div>
      <div id="willdo-list" class="task-list"></div>

    </div>

  </div>





  <!-- ── Search Bar ── -->
  <div id="search-bar" class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search-input" placeholder="Cerca tra le tasks..." autocomplete="off">
    <div class="search-close" id="search-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
  </div>

  <!-- ── Task Input Modal ── -->
  <div id="task-modal" class="modal-overlay">
    <div class="modal-box">
      <div id="modal-title" class="modal-title">Nuova Task</div>
      <input type="text" id="task-input" class="modal-input" placeholder="Cosa devi fare?" autocomplete="off">
      <div class="modal-actions">
        <button id="cancel-btn" class="modal-btn modal-btn-cancel">Annulla</button>
        <button id="save-btn" class="modal-btn modal-btn-confirm">Salva</button>
      </div>
    </div>
  </div>

  <!-- ── History Modal ── -->
  <div id="history-modal" class="history-overlay">
    <div class="history-menu">
      <div class="history-header">
        <div class="history-title">Recenti Eliminati</div>
        <button class="history-close" id="close-history-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- ── Settings Modal ── -->
  <div id="settings-modal" class="settings-overlay">
    <div class="settings-menu">
      <div class="settings-header">
        <h2 class="settings-title">Impostazioni</h2>
        <button class="settings-close" id="close-settings-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">Aspetto</div>
        <div class="settings-row">
          <span>Tema Colore</span>
          <div class="theme-selector" id="theme-picker">
            <div class="theme-dot" data-theme="cyan" style="background:#38bdf8"></div>
            <div class="theme-dot" data-theme="emerald" style="background:#34d399"></div>
            <div class="theme-dot" data-theme="violet" style="background:#a78bfa"></div>
            <div class="theme-dot" data-theme="coral" style="background:#fb7185"></div>
            <div class="theme-dot" data-theme="gold" style="background:#fbbf24"></div>
            <div class="theme-dot active" data-theme="white" style="background:#ffffff"></div>
          </div>
        </div>
        <div class="settings-row">
          <span>AMOLED True Black</span>
          <label class="toggle-switch">
            <input type="checkbox" id="amoled-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title">Dati</div>
        <button id="settings-export" class="settings-btn">Esporta Tasks (.json)</button>
        <label for="import-file-input" class="settings-btn" style="cursor:pointer; text-align:center;">Importa Tasks</label>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
        <button id="settings-clear" class="settings-btn danger">Cancella tutti i dati</button>
      </div>
    </div>
  </div>

  <script src="Sortable.min.js" charset="utf-8"></script>
  <script src="app.js" charset="utf-8"></script>

</body>
</html>
