<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="OnPoint — La tua To-Do e Will-Do List personale.">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OnPoint</title>

  <!-- PWA Manifest & App Icon -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #000000;
  --bg-secondary: #0a0a0a;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --accent: #38bdf8;
  --accent-hover: #0ea5e9;
  --accent-glow: rgba(56, 189, 248, 0.15);
  --priority-color: #fbbf24;
  --priority-bg: #1a1800;
  --danger: #8b5cf6;
  --danger-bg: rgba(139, 92, 246, 0.9);
  --border: #1e293b;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.7), 0 2px 4px -1px rgba(0, 0, 0, 0.4);
  --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.9), 0 4px 6px -2px rgba(0, 0, 0, 0.5);
  --radius: 16px;
}

/* Color Themes */
body.theme-cyan  { --accent: #38bdf8; --accent-hover: #0ea5e9; --accent-glow: rgba(56,189,248,0.15); }
body.theme-emerald { --accent: #34d399; --accent-hover: #10b981; --accent-glow: rgba(52,211,153,0.15); }
body.theme-violet { --accent: #a78bfa; --accent-hover: #8b5cf6; --accent-glow: rgba(167,139,250,0.15); }
body.theme-coral { --accent: #fb7185; --accent-hover: #f43f5e; --accent-glow: rgba(251,113,133,0.15); }
body.theme-gold  { --accent: #fbbf24; --accent-hover: #f59e0b; --accent-glow: rgba(251,191,36,0.15); }

/* AMOLED toggle */
body.amoled { --bg-color: #000000; --bg-secondary: #0a0a0a; --border: #1e293b; --priority-bg: #1a1800; }
body:not(.amoled) { --bg-color: #121212; --bg-secondary: #1e1e1e; --border: #334155; --priority-bg: #2d2a1b; }

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

body {
  background-color: var(--bg-color);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 2rem 1rem;
  overflow-x: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Trash Zone */
#trash-zone {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 90px;
  background-color: var(--danger-bg);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  transform: translateY(-100%);
  border-bottom-left-radius: 24px;
  border-bottom-right-radius: 24px;
  box-shadow: none;
}
#trash-zone.visible { 
  transform: translateY(0); 
  box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
}
#trash-zone.drag-over {
  background-color: var(--danger);
  transform: translateY(0) scale(1.02);
  box-shadow: 0 4px 25px rgba(139, 92, 246, 0.6);
}
.trash-icon { font-size: 1.8rem; margin-bottom: 4px; }

/* Header */
header { max-width: 600px; margin: 0 auto 2.5rem auto; width: 100%; position: relative; }
h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-primary); letter-spacing: -0.02em; }
.header-actions { display: flex; gap: 1rem; }

/* Header toolbar icons */
.header-toolbar { position: absolute; top: 0.5rem; right: 0; display: flex; gap: 0.5rem; z-index: 100; }
.toolbar-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; color: var(--text-secondary); cursor: pointer; border-radius: 50%; transition: all 0.2s; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
.toolbar-btn:hover { background-color: rgba(255,255,255,0.05); color: var(--accent); border-color: var(--accent); }

/* Settings Modal */
.settings-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: flex-start; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: visibility 0.3s, opacity 0.3s ease; padding: 2rem 1rem; }
.settings-modal.visible { visibility: visible; opacity: 1; }
.settings-modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.settings-modal-content { background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-hover); transform: translateY(30px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 3001; border: 1px solid var(--border); }
.settings-modal.visible .settings-modal-content { transform: translateY(0); }
.settings-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
.settings-modal-header h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 0; }
.settings-section-title { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; font-weight: 600; }
.settings-card { background: var(--bg-color); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; cursor: pointer; transition: background 0.15s; gap: 1rem; }
.settings-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.settings-row:hover { background: rgba(255,255,255,0.03); }
.settings-row-left { display: flex; align-items: center; gap: 0.75rem; }
.settings-row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.settings-row-icon.export { background: rgba(56,189,248,0.15); color: var(--accent); }
.settings-row-icon.import { background: rgba(16,185,129,0.15); color: #10b981; }
.settings-row-icon.danger { background: rgba(239,68,68,0.15); color: #ef4444; }
.settings-row-label { font-size: 0.95rem; color: var(--text-primary); }
.settings-row-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
.settings-row-chevron { color: var(--text-secondary); flex-shrink: 0; }

/* Theme Picker */
.theme-picker { display: flex; gap: 0.75rem; padding: 1rem 1.25rem; }
.theme-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; position: relative; }
.theme-dot:hover { transform: scale(1.15); }
.theme-dot.active { border-color: var(--text-primary); box-shadow: 0 0 12px var(--accent); }
.theme-dot.cyan { background: #38bdf8; }
.theme-dot.emerald { background: #34d399; }
.theme-dot.violet { background: #a78bfa; }
.theme-dot.coral { background: #fb7185; }
.theme-dot.gold { background: #fbbf24; }

/* AMOLED Toggle Row */
.amoled-toggle { display: flex; align-items: center; gap: 0.5rem; }
.amoled-switch { position: relative; width: 44px; height: 24px; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.amoled-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: var(--text-primary); border-radius: 50%; transition: transform 0.2s; }
.amoled-switch.on { background: var(--accent); }
.amoled-switch.on::after { transform: translateX(20px); }

/* Task counter badge */
.task-counter { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; border-radius: 12px; background: var(--accent-glow, rgba(56,189,248,0.15)); color: var(--accent); font-size: 0.75rem; font-weight: 700; padding: 0 7px; margin-left: 0.5rem; vertical-align: middle; }
.section-header { display: flex; align-items: center; margin-bottom: 1rem; }

button {
  border: none; background: none; cursor: pointer;
  font-size: 1rem; font-weight: 600;
  border-radius: var(--radius); transition: all 0.2s ease; outline: none;
}
.add-btn {
  background-color: var(--bg-secondary); color: var(--accent);
  border: 1px solid var(--border); padding: 1rem 1.25rem;
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; box-shadow: var(--shadow); border-radius: var(--radius);
}
.add-btn:hover, .add-btn:active { background-color: var(--accent); color: var(--bg-color); border-color: var(--accent); }
.add-btn span { font-size: 1.2rem; line-height: 1; }

/* Layout Main */
main { max-width: 600px; width: 100%; margin: 0 auto; flex: 1; display: flex; flex-direction: column; gap: 1.5rem; padding-bottom: 3rem; }
h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
.task-list { display: flex; flex-direction: column; gap: 0.75rem; min-height: 50px; }
.separator-wrapper { padding: 1rem 0; }
.separator { border: none; height: 2px; background: var(--border); border-radius: 2px; opacity: 0.5; }

/* History Modal Overlay */
.history-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: flex-start; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: visibility 0.3s, opacity 0.3s ease; padding: 2rem 1rem; }
.history-modal.visible { visibility: visible; opacity: 1; }
.history-modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.history-modal-content { background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-hover); transform: translateY(30px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 3001; border: 1px solid var(--border); }
.history-modal.visible .history-modal-content { transform: translateY(0); }
.history-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
.history-modal-header h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 0; }
.close-history { color: var(--text-secondary); cursor: pointer; padding: 0.5rem; transition: color 0.2s; }
.close-history:hover { color: #ef4444; }
.history-list { display: flex; flex-direction: column; gap: 0.75rem; }

/* Task WRAPPER */
.task-wrapper { position: relative; background-color: var(--danger); border-radius: var(--radius); overflow: hidden; margin-bottom: 0; }

/* Task enter animation */
@keyframes taskSlideIn {
  from { opacity: 0; transform: translateY(-12px) scale(0.97); max-height: 0; margin-bottom: 0; }
  to { opacity: 1; transform: translateY(0) scale(1); max-height: 200px; margin-bottom: 0; }
}
.task-wrapper.task-enter { animation: taskSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

/* Search Bar */
.search-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 2500; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.search-bar.visible { transform: translateY(0); }
.search-bar input { flex: 1; background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; font-size: 1rem; outline: none; font-family: inherit; user-select: text; -webkit-user-select: text; }
.search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-bar input::placeholder { color: var(--text-secondary); }
.search-close { color: var(--text-secondary); cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
.search-close:hover { color: #ef4444; }

/* Search dimming */
body.searching .task-wrapper { opacity: 0.2; transition: opacity 0.2s; }
body.searching .task-wrapper.search-match { opacity: 1; }
body.searching .task-wrapper.search-match .task-item { box-shadow: 0 0 0 1px var(--accent) inset, var(--shadow); }

/* Icone del cestino sovrapposte dalla direzione target */
.swipe-overlay-icon { position: absolute; top: 50%; transform: translateY(-50%) scale(1); z-index: 10; opacity: 0; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; pointer-events: none; color: white; }
.swipe-overlay-icon.left { left: 1.5rem; }
.swipe-overlay-icon.right { right: 1.5rem; }

/* Task Item (the visual card) */
.task-item {
  background-color: var(--bg-secondary); border-radius: var(--radius);
  padding: 1rem; display: flex; align-items: center; gap: 1rem;
  box-shadow: var(--shadow); transition: box-shadow 0.2s ease, background-color 0.3s ease;
  position: relative; z-index: 1; border: 1px solid transparent; width: 100%;
}
.task-wrapper.sortable-ghost { opacity: 0.3; }
.task-wrapper.sortable-drag .task-item { box-shadow: var(--shadow-hover); transform: scale(1.03) !important; z-index: 100; background-color: #262626; border-color: var(--border); }

/* Multi-select state & Checkbox */
.selection-checkbox { position: relative; width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; margin-right: 0.25rem; background-color: transparent; transition: all 0.2s ease; flex-shrink: 0; cursor: pointer; z-index: 20; }
.selection-checkbox::after { content: ''; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px; z-index: 21; }
.task-wrapper.selected .task-item { box-shadow: 0 0 0 2px var(--accent) inset, var(--shadow); background-color: #142a38; }
.task-wrapper.selected .selection-checkbox { background-color: var(--accent); border-color: var(--accent); }
.task-wrapper.selected .selection-checkbox::before { content: '✓'; color: var(--bg-color); font-size: 14px; font-weight: bold; }

/* Priority state */
.task-item.priority { background-color: var(--priority-bg); border: 1px solid rgba(251, 191, 36, 0.3); }
.task-wrapper.selected .task-item.priority { box-shadow: 0 0 0 2px var(--accent) inset, 0 0 10px rgba(251, 191, 36, 0.3); }

.priority-btn { width: 28px; height: 28px; border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background-color: transparent; transition: all 0.3s ease; cursor: pointer; }
.priority-btn::after { content: '☆'; color: var(--accent); font-size: 1.4rem; line-height: 1; transition: all 0.3s ease; }
.priority-btn:hover::after { transform: scale(1.1); }
.task-item.priority .priority-btn { background-color: transparent; box-shadow: none; }
.task-item.priority .priority-btn::after { content: '★'; color: var(--priority-color); filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)); }

.task-text { flex: 1; font-size: 1.05rem; line-height: 1.5; word-break: break-word; color: var(--text-primary); user-select: none; -webkit-user-select: none; }
.task-text a { color: var(--accent); text-decoration: underline; font-weight: 500; }

.task-actions { display: flex; align-items: center; gap: 0.75rem; }
.edit-btn, .rewind-btn { color: var(--text-secondary); cursor: pointer; transition: color 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
.edit-btn:hover { color: var(--accent); transform: scale(1.1); }
.rewind-btn:hover { color: #10b981; transform: scale(1.1); }

/* Drag Handle (Hidden) */
.drag-handle { display: none; }

/* Modal */
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: flex-start; justify-content: center; z-index: 2000; visibility: hidden; opacity: 0; transition: visibility 0.3s, opacity 0.3s ease; padding-top: 15vh; }
.modal.visible { visibility: visible; opacity: 1; }
.modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.modal-content { background: var(--bg-secondary); padding: 2rem; border-radius: var(--radius); width: 90%; max-width: 400px; box-shadow: var(--shadow-hover); transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 2001; border: 1px solid var(--border); }
.modal.visible .modal-content { transform: translateY(0); }
.modal-content h3 { margin-bottom: 1.5rem; color: var(--text-primary); font-weight: 600; }

#task-input { width: 100%; padding: 1rem; background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 1.5rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; user-select: text; -webkit-user-select: text; }
#task-input::placeholder { color: var(--text-secondary); }
#task-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }

.modal-actions { display: flex; justify-content: flex-end; gap: 1rem; }
.modal-actions button { padding: 0.75rem 1.25rem; border-radius: 12px; font-weight: 500; }
#cancel-btn { background: transparent; color: var(--text-secondary); border: 1px solid transparent; }
#cancel-btn:hover { background: rgba(255,255,255,0.05); }
#save-btn { background: var(--accent); color: var(--bg-color); }
#save-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>
  <div id="trash-zone" class="hidden">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    <span>Trascina qui per eliminare</span>
  </div>

  <!-- Search Bar -->
  <div id="search-bar" class="search-bar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search-input" placeholder="Cerca tra le tasks..." autocomplete="off">
    <div class="search-close" id="search-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
  </div>

  <header>
    <h1>Tasks</h1>
    <div class="header-toolbar">
      <div id="search-toggle" class="toolbar-btn" title="Cerca">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <div id="history-toggle" class="toolbar-btn" title="Cronologia eliminati">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
      </div>
      <div id="settings-toggle" class="toolbar-btn" title="Impostazioni">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </div>
    </div>
    <div class="header-actions">
      <button id="add-todo-btn" class="add-btn"><span>+</span> To Do</button>
      <button id="add-willdo-btn" class="add-btn"><span>+</span> Will Do</button>
    </div>
  </header>

  <main>
    <section class="task-section">
      <div class="section-header">
        <h2 style="margin-bottom:0">To Do</h2>
        <span id="todo-counter" class="task-counter">0</span>
      </div>
      <div id="todo-list" class="task-list"></div>
    </section>
    
    <div class="separator-wrapper">
      <hr class="separator">
    </div>

    <section class="task-section">
      <div class="section-header">
        <h2 style="margin-bottom:0">Will Do</h2>

  <script src="js/Sortable.min.js" charset="utf-8"></script>
  <script charset="utf-8">
const todoList = document.getElementById('todo-list');
const willdoList = document.getElementById('willdo-list');
const trashZone = document.getElementById('trash-zone');

const addTodoBtn = document.getElementById('add-todo-btn');
const addWilldoBtn = document.getElementById('add-willdo-btn');

const modal = document.getElementById('task-modal');
const taskInput = document.getElementById('task-input');
const cancelBtn = document.getElementById('cancel-btn');
const saveBtn = document.getElementById('save-btn');
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');

let targetListForNewTask = 'todo'; 

// Data store
let tasks = {
  todo: [],
  willdo: [],
  deleted: []
};
try {
  var savedTasks = localStorage.getItem('onPointTasks');
  if (savedTasks) {
    var parsed = JSON.parse(savedTasks);
    tasks.todo = parsed.todo || [];
    tasks.willdo = parsed.willdo || [];
    tasks.deleted = parsed.deleted || [];
  }
} catch(e) {}

let currentEditId = null;

// === THEME & AMOLED ===
var savedTheme = localStorage.getItem('onPointTheme') || 'cyan';
var savedAmoled = localStorage.getItem('onPointAmoled');
if (savedAmoled === null) savedAmoled = 'true'; // default AMOLED on

function applyTheme(theme) {
  document.body.className = document.body.className.replace(/theme-\w+/g, '').trim();
  document.body.classList.add('theme-' + theme);
  savedTheme = theme;
  localStorage.setItem('onPointTheme', theme);
  // Update active dot
  var dots = document.querySelectorAll('.theme-dot');
  dots.forEach(function(d) { d.classList.toggle('active', d.dataset.theme === theme); });
}

function applyAmoled(on) {
  if (on) {
    document.body.classList.add('amoled');
  } else {
    document.body.classList.remove('amoled');
  }
  localStorage.setItem('onPointAmoled', on ? 'true' : 'false');
  var sw = document.getElementById('amoled-switch');
  if (sw) sw.classList.toggle('on', on);
}

applyTheme(savedTheme);
applyAmoled(savedAmoled === 'true');

// Theme picker clicks
document.addEventListener('DOMContentLoaded', function() {
  var picker = document.getElementById('theme-picker');
  if (picker) picker.addEventListener('click', function(e) {
    var dot = e.target.closest('.theme-dot');
    if (dot) applyTheme(dot.dataset.theme);
  });
  var aSwitch = document.getElementById('amoled-switch');
  if (aSwitch) aSwitch.addEventListener('click', function() {
    var isOn = document.body.classList.contains('amoled');
    applyAmoled(!isOn);
  });
  // Set initial active dot
  applyTheme(savedTheme);
});

function saveState() {
  var newTodo = [];
  var newWilldo = [];
  
  var todoNodes = document.getElementById('todo-list').children;
  for (var i=0; i<todoNodes.length; i++) {
     if (todoNodes[i].classList.contains('sortable-ghost') || todoNodes[i].classList.contains('sortable-drag')) continue;
     var tText = todoNodes[i].querySelector('.task-text').textContent;
     var tPriority = todoNodes[i].querySelector('.task-item').classList.contains('priority');
     newTodo.push({ id: todoNodes[i].dataset.id, text: tText, priority: tPriority });
  }

  var willdoNodes = document.getElementById('willdo-list').children;
  for (var i=0; i<willdoNodes.length; i++) {
     if (willdoNodes[i].classList.contains('sortable-ghost') || willdoNodes[i].classList.contains('sortable-drag')) continue;
     var tText = willdoNodes[i].querySelector('.task-text').textContent;
     var tPriority = willdoNodes[i].querySelector('.task-item').classList.contains('priority');
     newWilldo.push({ id: willdoNodes[i].dataset.id, text: tText, priority: tPriority });
  }

  tasks.todo = newTodo;
  tasks.willdo = newWilldo;
  // tasks.deleted stays as is, updated during deletion events
  localStorage.setItem('onPointTasks', JSON.stringify(tasks));
  updateCounters();
}

function addToHistory(taskData) {
  var data = JSON.parse(JSON.stringify(taskData));
  data.deleted = true;
  tasks.deleted.unshift(data);
  if (tasks.deleted.length > 20) tasks.deleted.pop();
  renderHistory();
  saveState();
}

function renderHistory() {
  const historyList = document.getElementById('history-list');
  historyList.innerHTML = '';
  tasks.deleted.forEach(function(task) {
    historyList.appendChild(renderTask(task));
  });
}

function rewindTask(id) {
  var index = tasks.deleted.findIndex(function(t) { return t.id === id; });
  if (index !== -1) {
    var task = tasks.deleted.splice(index, 1)[0];
    task.deleted = false;
    tasks.todo.push(task);
    renderAll();
    saveState();
  }
}

// State Management for Android Back Button
let currentState = null;

function pushAppState(stateName) {
  if (currentState === stateName) return;
  currentState = stateName;
  history.pushState({ appState: stateName }, '');
}

window.onpopstate = function(event) {
  var state = event.state ? event.state.appState : null;
  currentState = state;
  
  if (state !== 'history') {
    document.getElementById('history-modal').classList.remove('visible');
  }
  if (state !== 'settings') {
    document.getElementById('settings-modal').classList.remove('visible');
  }
  if (state !== 'search') {
    var searchBar = document.getElementById('search-bar');
    if (searchBar) {
       searchBar.classList.remove('visible');
       document.getElementById('search-input').blur();
       document.body.classList.remove('searching');
       document.querySelectorAll('.task-wrapper').forEach(function(w){ w.classList.remove('search-match'); });
    }
  }
  if (state !== 'taskModal') {
    document.getElementById('task-modal').classList.remove('visible');
    taskInput.blur();
  }
  if (state !== 'selection') {
    document.querySelectorAll('.task-wrapper.selected').forEach(function(w) {
      w.classList.remove('selected');
    });
    document.body.classList.remove('selection-mode');
  }
};

function openHistory() {
  document.getElementById('history-modal').classList.add('visible');
  document.getElementById('history-modal').classList.remove('hidden');
  pushAppState('history');
}

function closeHistory() {
  document.getElementById('history-modal').classList.remove('visible');
  if (currentState === 'history') history.back();
}

document.getElementById('history-toggle').onclick = openHistory;
document.getElementById('close-history-btn').onclick = closeHistory;
document.getElementById('history-overlay').onclick = closeHistory;

// === SEARCH ===
const searchBar = document.getElementById('search-bar');
const searchInput = document.getElementById('search-input');

function openSearch() {
  searchBar.classList.add('visible');
  pushAppState('search');
  setTimeout(function() { searchInput.focus(); }, 100);
}
function closeSearch() {
  searchBar.classList.remove('visible');
  searchInput.value = '';
  searchInput.blur();
  document.body.classList.remove('searching');
  document.querySelectorAll('.task-wrapper').forEach(function(w){ w.classList.remove('search-match'); });
  if (currentState === 'search') history.back();
}

document.getElementById('search-toggle').onclick = openSearch;
document.getElementById('search-close').onclick = closeSearch;

searchInput.addEventListener('input', function(e) {
  var term = e.target.value.toLowerCase().trim();
  if (!term) {
    document.body.classList.remove('searching');
    document.querySelectorAll('.task-wrapper').forEach(function(w){ w.classList.remove('search-match'); });
    return;
  }
  
  document.body.classList.add('searching');
  document.querySelectorAll('.task-wrapper').forEach(function(w) {
    var tText = w.querySelector('.task-text').textContent.toLowerCase();
    if (tText.includes(term)) {
      w.classList.add('search-match');
    } else {
      w.classList.remove('search-match');
    }
  });
});

// === SETTINGS ===
function openSettings() {
  document.getElementById('settings-modal').classList.add('visible');
  document.getElementById('settings-modal').classList.remove('hidden');
  pushAppState('settings');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
  if (currentState === 'settings') history.back();
}
document.getElementById('settings-toggle').onclick = openSettings;
document.getElementById('close-settings-btn').onclick = closeSettings;
document.getElementById('settings-overlay').onclick = closeSettings;

// Esporta
document.getElementById('settings-export').onclick = function() {
  saveState();
  var dataStr = JSON.stringify(tasks, null, 2);
  var blob = new Blob([dataStr], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'onpoint_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

// Importa
document.getElementById('settings-import').onclick = function() {
  document.getElementById('import-file-input').click();
};
document.getElementById('import-file-input').onchange = function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(event) {
    try {
      var imported = JSON.parse(event.target.result);
      if (imported.todo && imported.willdo) {
        tasks.todo = imported.todo;
        tasks.willdo = imported.willdo;
        tasks.deleted = imported.deleted || [];
        localStorage.setItem('onPointTasks', JSON.stringify(tasks)); 
        renderAll();
        updateCounters();
        closeSettings();
        alert('Tasks importate con successo!');
      } else {
        alert('File non valido. Deve contenere le chiavi "todo" e "willdo".');
      }
    } catch(err) {
      alert('Errore nel leggere il file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

// Cancella tutto
document.getElementById('settings-clear').onclick = function() {
  if (confirm('Sei sicuro? Questa azione cancellerà definitivamente TUTTE le tasks, incluse quelle eliminate di recente.')) {
    tasks = { todo: [], willdo: [], deleted: [] };
    localStorage.removeItem('onPointTasks');
    renderAll();
    closeSettings();
  }
};

// Selection Mode Manager
function updateSelectionMode() {
  const selectedCount = document.querySelectorAll('.task-wrapper.selected').length;
  const isSelectionMode = document.body.classList.contains('selection-mode');
  
  if (selectedCount > 0 && !isSelectionMode) {
    document.body.classList.add('selection-mode');
    pushAppState('selection');
  } else if (selectedCount === 0 && isSelectionMode) {
    document.body.classList.remove('selection-mode');
    if (currentState === 'selection') history.back();
  } else if (selectedCount === 0) {
    document.body.classList.remove('selection-mode');
  }
}

// Render lists
function renderTask(task) {
  const wrapper = document.createElement('div');
  wrapper.className = 'task-wrapper';
  wrapper.dataset.id = task.id;

  const bgLeft = document.createElement('div');
  bgLeft.className = 'swipe-overlay-icon left';
  bgLeft.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';

  const bgRight = document.createElement('div');
  bgRight.className = 'swipe-overlay-icon right';
  bgRight.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';

  const div = document.createElement('div');
  div.className = 'task-item' + (task.priority ? ' priority' : '');

  const checkbox = document.createElement('div');
  checkbox.className = 'selection-checkbox';
  
  let chkStartX, chkStartY;
  checkbox.addEventListener('pointerdown', function(e) {
    if (e.button !== undefined && e.button !== 0) return;
    chkStartX = e.clientX;
    chkStartY = e.clientY;
    // Non facciamo preventDefault qui altrimenti blocchiamo lo scroll se parte dal quadratino
    e.stopPropagation();
  });

  checkbox.addEventListener('pointerup', function(e) {
    if (e.button !== undefined && e.button !== 0) return;
    const dist = Math.sqrt(Math.pow(e.clientX - chkStartX, 2) + Math.pow(e.clientY - chkStartY, 2));
    if (dist < 10) { // Se il movimento è minimo, è un click
       e.preventDefault();
       e.stopPropagation();
       e.stopImmediatePropagation();
       wrapper.classList.toggle('selected');
       updateSelectionMode();
       if (navigator.vibrate) navigator.vibrate(20);
    }
  });

  const priorityBtn = document.createElement('button');
  priorityBtn.className = 'priority-btn';
  priorityBtn.onclick = function(e) {
    e.stopPropagation();
    togglePriority(task.id, div, wrapper);
  };

  const textSpan = document.createElement('span');
  textSpan.className = 'task-text';
  // Trasforma eventuali url in link cliccabili
  const escapedText = task.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
  textSpan.innerHTML = escapedText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

  const dragHandle = document.createElement('div');
  dragHandle.className = 'drag-handle';
  dragHandle.innerHTML = '<svg width="14" height="28" viewBox="0 0 14 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 4L3 9H11L7 4Z" fill="currentColor"/><rect x="3" y="13" width="8" height="2" fill="currentColor"/><path d="M7 24L11 19H3L7 24Z" fill="currentColor"/></svg>';

  div.appendChild(checkbox);
  div.appendChild(priorityBtn);
  div.appendChild(textSpan);

  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'task-actions';

  if (task.deleted) {
    const rewindBtn = document.createElement('div');
    rewindBtn.className = 'rewind-btn';
    rewindBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>';
    rewindBtn.onclick = function(e) {
      e.stopPropagation();
      rewindTask(task.id);
    };
    actionsDiv.appendChild(rewindBtn);
    // Remove checkbox and priority for history items
    checkbox.style.display = 'none';
    priorityBtn.style.display = 'none';
  } else {
    const editBtn = document.createElement('div');
    editBtn.className = 'edit-btn';
    editBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
    editBtn.onclick = function(e) {
      e.stopPropagation();
      openEditModal(task.id);
    };
    actionsDiv.appendChild(editBtn);
  }

  div.appendChild(actionsDiv);
  wrapper.appendChild(bgLeft);
  wrapper.appendChild(bgRight);
  wrapper.appendChild(div);

  // === UNIFIED POINTER LOGIC ===
  var startX = 0, startY = 0;
  var currentX = 0;
  var isPointerDown = false;
  var isSwiping = false;

  function getClientPos(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function handlePointerDown(e) {
    if (e.button !== undefined && e.button !== 0) return; 
    if (e.target.closest('.selection-checkbox') || e.target.closest('.priority-btn') || e.target.closest('.task-actions') || e.target.closest('a')) return;
    
    isPointerDown = true;
    isSwiping = false;
    currentX = 0;

    var pos = getClientPos(e);
    startX = pos.x;
    startY = pos.y;
    
    div.style.transition = 'none';
    bgLeft.style.transform = 'translateY(-50%) scale(1)';
    bgRight.style.transform = 'translateY(-50%) scale(1)';
    bgLeft.style.opacity = '0';
    bgRight.style.opacity = '0';
  }

  function handlePointerMove(e) {
    if (!isPointerDown) return;
    
    var pos = getClientPos(e);
    var deltaX = pos.x - startX;
    var deltaY = pos.y - startY;

    if (!isSwiping && Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
      isPointerDown = false; 
      return; 
    }

    if (Math.abs(deltaX) > 15 && Math.abs(deltaX) > Math.abs(deltaY)) {
      isSwiping = true;
    }

    if (isSwiping) {
      if (e.cancelable) e.preventDefault(); 
      
      currentX = deltaX;
      div.style.transform = 'translateX(' + currentX + 'px)';

      if (currentX > 0) {
        bgLeft.style.opacity = Math.min(1, currentX / 50);
        bgLeft.style.transform = 'translateY(-50%) scale(' + (currentX > 80 ? 1.25 : 1) + ')';
        bgRight.style.opacity = '0';
      } else {
        bgRight.style.opacity = Math.min(1, Math.abs(currentX) / 50);
        bgRight.style.transform = 'translateY(-50%) scale(' + (currentX < -80 ? 1.25 : 1) + ')';
        bgLeft.style.opacity = '0';
      }
    }
  }

  function handlePointerUp(e) {
    if (!isPointerDown) return;
    isPointerDown = false;
    
    if (isSwiping) {
      isSwiping = false;
      div.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      
      if (Math.abs(currentX) > 100) {
        var targetWrappers = [wrapper];
        if (wrapper.classList.contains('selected')) {
           targetWrappers = Array.from(document.querySelectorAll('.task-wrapper.selected'));
           if (targetWrappers.indexOf(wrapper) === -1) targetWrappers.push(wrapper);
        }
        
        for (var i = 0; i < targetWrappers.length; i++) {
           (function(w) {
             var item = w.querySelector('.task-item');
             if (item) {
               item.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
               item.style.opacity = '0';
               item.style.transform = 'translateX(' + (currentX > 0 ? window.innerWidth : -window.innerWidth) + 'px)';
             }
             w.classList.remove('selected');
             w.style.transition = 'height 0.3s ease, margin 0.3s ease, opacity 0.3s ease';
             w.style.opacity = '0';
             w.style.height = w.offsetHeight + 'px';
             setTimeout(function() { w.style.height = '0px'; w.style.marginBottom = '0px'; }, 50);
             setTimeout(function() { 
                 if (w.parentNode) {
                   var tId = w.dataset.id;
                   var taskData = tasks.todo.find(function(t){return t.id===tId}) || tasks.willdo.find(function(t){return t.id===tId});
                   if (taskData) addToHistory(taskData);
                   w.parentNode.removeChild(w); 
                 }
                 saveState();
               }, 350);
           })(targetWrappers[i]);
        }
        setTimeout(function() { updateSelectionMode(); }, 50);

      } else {
        div.style.transform = '';
        bgLeft.style.transform = 'translateY(-50%) scale(1)';
        bgRight.style.transform = 'translateY(-50%) scale(1)';
        bgLeft.style.opacity = '0';
        bgRight.style.opacity = '0';
      }
    }
  }

  div.addEventListener('click', function(e) {
    if (e.target.closest('a') || e.target.closest('.priority-btn') || e.target.closest('.task-actions')) return;
  });

  div.addEventListener('mousedown', handlePointerDown);
  document.addEventListener('mousemove', handlePointerMove, { passive: false });
  document.addEventListener('mouseup', handlePointerUp);
  
  div.addEventListener('touchstart', handlePointerDown, { passive: true });
  div.addEventListener('touchmove', handlePointerMove, { passive: false });
  div.addEventListener('touchend', handlePointerUp);
  div.addEventListener('touchcancel', handlePointerUp);

  return wrapper;
}

function renderAll() {
  todoList.innerHTML = '';
  willdoList.innerHTML = '';
  tasks.todo.forEach(function(task) { todoList.appendChild(renderTask(task)); });
  tasks.willdo.forEach(function(task) { willdoList.appendChild(renderTask(task)); });
  renderHistory();
  updateCounters();
}

function updateCounters() {
  document.getElementById('todo-counter').textContent = tasks.todo.length;
  document.getElementById('willdo-counter').textContent = tasks.willdo.length;
}

function openEditModal(id) {
  var task = tasks.todo.find(function(t) { return t.id === id; }) || tasks.willdo.find(function(t) { return t.id === id; });
  if (!task) return;
  currentEditId = id;
  modalTitle.textContent = 'Modifica Task';
  taskInput.value = task.text;
  modal.classList.add('visible');
  modal.classList.remove('hidden');
  pushAppState('taskModal');
  setTimeout(function() { taskInput.focus(); }, 100);
}

function togglePriority(id, element, parentWrapper) {
  var task = tasks.todo.find(function(t) { return t.id === id; }) || tasks.willdo.find(function(t) { return t.id === id; });
  if (!task) return;

  if (parentWrapper && parentWrapper.classList.contains('selected')) {
     var selectedWrappers = document.querySelectorAll('.task-wrapper.selected');
     var targetToPriority = !task.priority; 
     selectedWrappers.forEach(function(w) {
        var tId = w.dataset.id;
        var subTask = tasks.todo.find(function(t) { return t.id === tId; }) || tasks.willdo.find(function(t) { return t.id === tId; });
        if (subTask) {
           subTask.priority = targetToPriority;
           var subItem = w.querySelector('.task-item');
           if (subItem) {
               if (targetToPriority) subItem.classList.add('priority');
               else subItem.classList.remove('priority');
           }
        }
     });
  } else {
     task.priority = !task.priority;
     if (task.priority) element.classList.add('priority');
     else element.classList.remove('priority');
  }
  saveState();
}

addTodoBtn.onclick = function() { openModal('todo'); };
addWilldoBtn.onclick = function() { openModal('willdo'); };
cancelBtn.onclick = closeModal;
modalOverlay.onclick = closeModal;

function openModal(listType) {
  targetListForNewTask = listType;
  currentEditId = null;
  modalTitle.textContent = listType === 'todo' ? 'Nuova Task - To Do' : 'Nuova Task - Will Do';
  taskInput.value = '';
  modal.classList.add('visible');
  modal.classList.remove('hidden'); 
  pushAppState('taskModal');
  setTimeout(function() { taskInput.focus(); }, 100);
}

function closeModal() {
  modal.classList.remove('visible');
  taskInput.blur();
  if (currentState === 'taskModal') history.back();
}

saveBtn.onclick = saveTask;
taskInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') saveTask();
});

function saveTask() {
  var text = taskInput.value.trim();
  if (!text) return;

  if (currentEditId) {
    var task = tasks.todo.find(function(t) { return t.id === currentEditId; }) || tasks.willdo.find(function(t) { return t.id === currentEditId; });
    if (task) {
      task.text = text;
      renderAll();
    }
  } else {
    var newTask = { id: Date.now().toString(), text: text, priority: false };
    tasks[targetListForNewTask].push(newTask);
    var listEl = targetListForNewTask === 'todo' ? todoList : willdoList;
    var newWrapper = renderTask(newTask);
    newWrapper.classList.add('task-enter');
    listEl.appendChild(newWrapper);
    setTimeout(function() { newWrapper.classList.remove('task-enter'); }, 400);
  }
  saveState();
  closeModal();
}

renderAll();

// SortableJS init
try {
  if (typeof Sortable !== 'undefined') {
    var sortableOptions = {
      group: 'tasks',
      animation: 250,
      delay: 150,
      delayOnTouchOnly: true,
      fallbackTolerance: 3,
      easing: "cubic-bezier(1, 0, 0, 1)",
      scroll: true,
      scrollSensitivity: 80,
      scrollSpeed: 20,
      bubbleScroll: true,
      filter: '.selection-checkbox',
      preventOnFilter: false,
      onStart: function(evt) {
        trashZone.classList.add('visible');
        if (navigator.vibrate) navigator.vibrate(50);
      },
      onEnd: function(evt) {
        trashZone.classList.remove('visible');
        trashZone.classList.remove('drag-over');
        saveState();
      }
    };

    new Sortable(todoList, sortableOptions);
    new Sortable(willdoList, sortableOptions);

    new Sortable(trashZone, {
      group: 'tasks',
      ghostClass: 'sortable-ghost',
      onAdd: function(evt) {
        var itemsToDelete = evt.items && evt.items.length > 0 ? Array.from(evt.items) : [evt.item];
        
        // Forza anche tutte le *attualmente selezionate* a essere rimosse se non sono già nell'array (garantisce il multi-drop)
        var allSelected = document.querySelectorAll('.task-wrapper.selected');
        allSelected.forEach(function(selNode) {
            if (itemsToDelete.indexOf(selNode) === -1) {
                itemsToDelete.push(selNode);
            }
        });

        itemsToDelete.forEach(function(item) {
          if (item.parentNode) {
            var tId = item.dataset.id;
            var taskData = tasks.todo.find(function(t){return t.id===tId}) || tasks.willdo.find(function(t){return t.id===tId});
            if (taskData) addToHistory(taskData);
            item.parentNode.removeChild(item);
          }
        });
        trashZone.classList.remove('drag-over');
        trashZone.classList.remove('visible');
        updateSelectionMode();
        saveState();
      },
      onEnd: function(evt) {
        trashZone.classList.remove('visible');
        trashZone.classList.remove('drag-over');
      },
      onChange: function(evt) { trashZone.classList.add('drag-over'); },
      onRemove: function(evt) { trashZone.classList.remove('drag-over'); }
    });
  }
} catch(e) {
  console.warn('SortableJS not loaded', e);
}

trashZone.addEventListener('dragover', function(e) { e.preventDefault(); trashZone.classList.add('drag-over'); });
trashZone.addEventListener('dragleave', function() { trashZone.classList.remove('drag-over'); });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(registration) {
      console.log('ServiceWorker registrato con successo.');
    }, function(err) {
      console.log('Fallimento registrazione ServiceWorker: ', err);
    });
  });
}
  </script>
